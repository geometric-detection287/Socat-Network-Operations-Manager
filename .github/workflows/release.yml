#======================================================================
# GitHub Actions Workflow: Release
#======================================================================
# Synopsis   : Continuous delivery workflow for socat_manager.sh.
#
# Description: Triggered when a version tag (v*) is pushed. Workflow:
#
#              1. Runs the full test suite (lint + BATS) to ensure
#                 the tagged commit is clean
#              2. Builds two release tarballs:
#                 - socat-manager-v<VERSION>.tar.gz (source + docs + tests)
#                 - socat-manager-v<VERSION>-venv-example.tar.gz (ready-to-use)
#              3. Generates SHA256 checksums for both tarballs
#              4. Creates a GitHub Release with:
#                 - Auto-generated release notes from commits
#                 - Both tarballs attached as assets
#                 - SHA256SUMS.txt attached for verification
#
# Triggers   : Push of a tag matching 'v*' (e.g., v2.3.0, v2.4.0-rc1)
#
# Usage      : To create a release:
#
#              git tag v2.3.0
#              git push origin v2.3.0
#
#              The workflow runs automatically. When complete, the
#              release appears at: github.com/<org>/<repo>/releases
#
# Notes      : - The test job must pass before the release job runs
#              - Pre-release tags (e.g., v2.4.0-rc1) are marked as
#                pre-releases on the GitHub Release page
#              - Release notes are auto-generated from commit messages
#                since the previous tag
#              - Uses GITHUB_TOKEN (automatic) for release creation
#
# Version    : 1.0.0
#======================================================================

name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on any tag starting with 'v'

# =====================================================================
# PERMISSIONS
# Requires write access to create releases and upload assets.
# =====================================================================

permissions:
  contents: write  # Required for creating releases and uploading assets

# =====================================================================
# JOB: test
# Run the full test suite before building the release.
# If tests fail, the release is NOT created.
# =====================================================================

jobs:
  test:
    name: Verify tests pass
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          # Install BATS from source
          git clone --depth 1 --branch "v1.11.1" \
            https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local

      - name: Run ShellCheck
        run: shellcheck --shell=bash --severity=warning socat_manager.sh

      - name: Prepare test stubs
        run: chmod +x tests/stubs/*

      - name: Run all BATS tests
        run: bats --recursive tests/

  # ===================================================================
  # JOB: release
  # Build distribution tarballs and create a GitHub Release.
  # Only runs after tests pass.
  # ===================================================================

  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    needs: test  # Only release if tests pass

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history for release notes generation

      # --- Extract version from tag ---
      - name: Extract version from tag
        id: version
        run: |
          # Strip the 'v' prefix from the tag name
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "dist_name=socat-manager-v${VERSION}" >> "$GITHUB_OUTPUT"
          echo ""
          echo "Tag:     ${TAG}"
          echo "Version: ${VERSION}"

      # --- Verify version matches script ---
      - name: Verify tag matches script version
        run: |
          SCRIPT_VERSION=$(grep -m1 'SCRIPT_VERSION=' socat_manager.sh | cut -d'"' -f2)
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "${SCRIPT_VERSION}" != "${TAG_VERSION}" ]; then
            echo "ERROR: Tag version (${TAG_VERSION}) does not match script version (${SCRIPT_VERSION})"
            echo "Update SCRIPT_VERSION in socat_manager.sh to match the tag."
            exit 1
          fi
          echo "✓ Version match: ${SCRIPT_VERSION}"

      # --- Build distribution packages via Makefile ---
      # Uses `make dist` which is the single source of truth for tarball
      # contents. This ensures the GitHub Release assets match exactly
      # what `make dist` produces locally.
      - name: Build distribution packages
        run: make dist

      # --- List distribution artifacts ---
      - name: List distribution artifacts
        run: |
          echo "Distribution packages:"
          ls -lh dist/
          echo ""
          echo "SHA256 checksums:"
          cat dist/SHA256SUMS.txt

      # --- Create GitHub Release ---
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Socat Network Operations Manager ${{ steps.version.outputs.tag }}"
          body: |
            ## Socat Network Operations Manager ${{ steps.version.outputs.tag }}

            ### Installation

            **One-command install (from source tarball):**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/${{ steps.version.outputs.dist_name }}.tar.gz | tar xz
            cd ${{ steps.version.outputs.dist_name }}
            sudo make install
            socat-manager --version
            ```

            **Ready-to-use virtual environment:**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/${{ steps.version.outputs.dist_name }}-venv-example.tar.gz | tar xz
            source ${{ steps.version.outputs.dist_name }}-venv-example/activate.sh
            socat-manager --version
            ```

            ### Verify download integrity
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```

            ### What's changed
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ steps.version.outputs.tag }}/CHANGELOG.md) for full details.
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, 'rc') || contains(steps.version.outputs.tag, 'beta') || contains(steps.version.outputs.tag, 'alpha') }}
          files: |
            dist/${{ steps.version.outputs.dist_name }}.tar.gz
            dist/${{ steps.version.outputs.dist_name }}-venv-example.tar.gz
            dist/SHA256SUMS.txt
          generate_release_notes: true  # Append auto-generated notes from commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
