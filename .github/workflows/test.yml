#======================================================================
# GitHub Actions Workflow: Test & Lint
#======================================================================
# Synopsis   : Continuous integration workflow for socat_manager.sh.
#
# Description: Runs on every push and pull request. Two parallel jobs:
#
#              1. lint    — ShellCheck static analysis (fast, ~30s)
#              2. test    — BATS test suite across a matrix of bash
#                           versions (4.4, 5.1, 5.2) and Ubuntu
#                           releases (22.04, 24.04)
#
#              The lint job runs independently so ShellCheck failures
#              are reported immediately without waiting for the full
#              test matrix. The test job installs BATS from GitHub
#              releases (not apt, which ships outdated versions) and
#              runs the full unit + integration test suite.
#
# Triggers   : push to any branch, pull_request to any branch
#
# Usage      : This file goes at .github/workflows/test.yml
#              No configuration needed — it runs automatically.
#
# Required   : Repository must contain:
#              - socat_manager.sh (main script)
#              - .shellcheckrc (ShellCheck configuration)
#              - tests/ directory (BATS test files)
#
# Version    : 1.0.0
#======================================================================

name: Test & Lint

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Cancel in-progress runs when a new commit is pushed to the same branch/PR.
# This prevents wasted CI minutes on superseded commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# =====================================================================
# JOB: lint
# Runs ShellCheck static analysis on the main script.
# Fast (~30s) and independent of the test matrix.
# =====================================================================

jobs:
  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: shellcheck --shell=bash --severity=warning socat_manager.sh

      - name: Lint wrapper script
        run: shellcheck --shell=bash --severity=warning bin/socat-manager

  # ===================================================================
  # JOB: test
  # Runs the full BATS test suite across a matrix of bash versions
  # and Ubuntu releases. Each combination runs independently.
  #
  # Matrix:
  #   os:   ubuntu-22.04, ubuntu-24.04
  #   bash: 4.4, 5.1, 5.2 (compiled from source for non-system versions)
  #
  # BATS is installed from GitHub releases to get the latest version
  # (apt's bats package is typically 1.2.x, which is ancient).
  # ===================================================================

  test:
    name: BATS (bash ${{ matrix.bash }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint  # Only run tests if lint passes

    strategy:
      fail-fast: false  # Run all matrix entries even if one fails
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        bash: ['system']  # Use system bash by default
        include:
          # Test with the system bash on each OS (5.1 on 22.04, 5.2 on 24.04)
          - os: ubuntu-22.04
            bash: 'system'
            bash_label: '5.1 (system)'
          - os: ubuntu-24.04
            bash: 'system'
            bash_label: '5.2 (system)'
          # Test with bash 4.4 (minimum supported version) on latest Ubuntu
          - os: ubuntu-24.04
            bash: '4.4'
            bash_label: '4.4 (compiled)'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # --- Install BATS from GitHub releases ---
      - name: Install BATS
        run: |
          BATS_VERSION="1.11.1"
          echo "Installing BATS v${BATS_VERSION}..."
          git clone --depth 1 --branch "v${BATS_VERSION}" \
            https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
          bats --version

      # --- Install bash 4.4 from source (only for the 4.4 matrix entry) ---
      - name: Compile bash 4.4 from source
        if: matrix.bash == '4.4'
        run: |
          echo "Compiling bash 4.4 from source..."
          sudo apt-get update && sudo apt-get install -y build-essential
          cd /tmp
          curl -fsSL https://ftp.gnu.org/gnu/bash/bash-4.4.tar.gz | tar xz
          cd bash-4.4
          ./configure --prefix=/usr/local/bash-4.4 2>&1 | tail -5
          make -j"$(nproc)" 2>&1 | tail -5
          sudo make install 2>&1 | tail -5
          /usr/local/bash-4.4/bin/bash --version | head -1
          # Make this bash the default for the test run
          echo "/usr/local/bash-4.4/bin" >> "$GITHUB_PATH"

      # --- Verify bash version ---
      - name: Verify bash version
        run: |
          echo "Bash version:"
          bash --version | head -1
          echo "Bash location:"
          which bash

      # --- Ensure test stubs are executable ---
      - name: Prepare test stubs
        run: chmod +x tests/stubs/*

      # --- Run unit tests ---
      - name: Run unit tests
        run: |
          mkdir -p test-results
          echo "Running unit tests..."
          bats tests/unit/ --tap > test-results/unit.tap 2>&1 || {
            echo "Unit tests failed. Output:"
            cat test-results/unit.tap
            exit 1
          }
          cat test-results/unit.tap

      # --- Run integration tests ---
      - name: Run integration tests
        run: |
          mkdir -p test-results
          echo "Running integration tests..."
          bats tests/integration/ --tap > test-results/integration.tap 2>&1 || {
            echo "Integration tests failed. Output:"
            cat test-results/integration.tap
            exit 1
          }
          cat test-results/integration.tap

      # --- Upload test results on failure ---
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: test-results-bash-${{ matrix.bash }}-${{ matrix.os }}
          path: test-results/
          retention-days: 14

      # --- Summary ---
      - name: Test summary
        if: always()
        run: |
          echo ""
          echo "=== Test Matrix Entry ==="
          echo "  OS:   ${{ matrix.os }}"
          echo "  Bash: ${{ matrix.bash_label || matrix.bash }}"
          echo "  BATS: $(bats --version)"
          echo ""
