#======================================================================
# GitHub Actions Workflow: Test & Lint
#======================================================================
# Synopsis   : Continuous integration workflow for socat_manager.sh.
#
# Description: Runs on every push and pull request. Three parallel jobs:
#
#              1. lint    — ShellCheck static analysis (fast, ~30s)
#              2. test    — BATS test suite on native Ubuntu runners
#                           across bash versions (4.4, 5.1, 5.2)
#              3. test-distros — BATS test suite on additional Linux
#                           distributions via Docker containers
#                           (Debian, Kali, Rocky, AlmaLinux, Arch)
#
# Triggers   : push to any branch, pull_request to any branch
#
# Version    : 1.1.0
#======================================================================

name: Test & Lint

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Force Node.js 24 for all JavaScript-based actions to resolve
# the Node.js 20 deprecation warnings (effective June 2, 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel in-progress runs when a new commit is pushed to the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# =====================================================================
# JOB: lint
# =====================================================================

jobs:
  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint socat_manager.sh
        run: shellcheck --shell=bash --severity=warning socat_manager.sh

      - name: Lint bin/socat-manager
        run: shellcheck --shell=bash --severity=warning bin/socat-manager

  # ===================================================================
  # JOB: test
  # Native Ubuntu runners with bash version matrix.
  # Tests system bash on 22.04 (5.1) and 24.04 (5.2), plus bash 4.4
  # compiled from source to verify minimum supported version.
  # ===================================================================

  test:
    name: BATS (${{ matrix.bash_label }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            bash: 'system'
            bash_label: 'bash 5.1'
          - os: ubuntu-24.04
            bash: 'system'
            bash_label: 'bash 5.2'
          - os: ubuntu-24.04
            bash: '4.4'
            bash_label: 'bash 4.4'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install BATS
        run: |
          git clone --depth 1 --branch "v1.11.1" \
            https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
          bats --version

      - name: Compile bash 4.4 from source
        if: matrix.bash == '4.4'
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential
          cd /tmp
          curl -fsSL https://ftp.gnu.org/gnu/bash/bash-4.4.tar.gz | tar xz
          cd bash-4.4
          ./configure --prefix=/usr/local/bash-4.4 2>&1 | tail -3
          make -j"$(nproc)" 2>&1 | tail -3
          sudo make install 2>&1 | tail -3
          echo "/usr/local/bash-4.4/bin" >> "$GITHUB_PATH"

      - name: Verify bash version
        run: bash --version | head -1

      - name: Prepare test stubs
        run: chmod +x tests/stubs/*

      - name: Run unit tests
        run: |
          mkdir -p test-results
          bats tests/unit/ --tap > test-results/unit.tap 2>&1 || {
            echo "Unit tests failed. Output:"
            cat test-results/unit.tap
            exit 1
          }
          cat test-results/unit.tap

      - name: Run integration tests
        run: |
          mkdir -p test-results
          bats tests/integration/ --tap > test-results/integration.tap 2>&1 || {
            echo "Integration tests failed. Output:"
            cat test-results/integration.tap
            exit 1
          }
          cat test-results/integration.tap

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.bash_label }}-${{ matrix.os }}
          path: test-results/
          retention-days: 14

      - name: Test summary
        if: always()
        run: |
          echo "=== Test Matrix Entry ==="
          echo "  OS:   ${{ matrix.os }}"
          echo "  Bash: ${{ matrix.bash_label }}"
          echo "  BATS: $(bats --version)"

  # ===================================================================
  # JOB: test-distros
  # Additional Linux distributions via Docker containers.
  # Each container installs bash and BATS, then runs the test suite.
  # Verifies compatibility across the Linux ecosystem.
  #
  # Notes:
  #   - CentOS 7 is EOL and not included (use Rocky/Alma instead)
  #   - RHEL requires subscription; Rocky/Alma are free equivalents
  #   - Kali uses kali-rolling (always latest)
  # ===================================================================

  test-distros:
    name: BATS (${{ matrix.distro_label }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        include:
          - container: 'debian:12'
            distro_label: 'Debian 12'
            pkg_manager: 'apt'
          - container: 'kalilinux/kali-rolling'
            distro_label: 'Kali Rolling'
            pkg_manager: 'apt'
          - container: 'rockylinux:9'
            distro_label: 'Rocky Linux 9'
            pkg_manager: 'dnf'
          - container: 'almalinux:9'
            distro_label: 'AlmaLinux 9'
            pkg_manager: 'dnf'
          - container: 'archlinux:latest'
            distro_label: 'Arch Linux'
            pkg_manager: 'pacman'

    container:
      image: ${{ matrix.container }}

    steps:
      - name: Install prerequisites (apt)
        if: matrix.pkg_manager == 'apt'
        run: |
          apt-get update
          apt-get install -y bash git curl make coreutils procps util-linux
          bash --version | head -1

      - name: Install prerequisites (dnf)
        if: matrix.pkg_manager == 'dnf'
        run: |
          dnf install -y --allowerasing bash git curl make coreutils procps-ng util-linux
          bash --version | head -1

      - name: Install prerequisites (pacman)
        if: matrix.pkg_manager == 'pacman'
        run: |
          pacman -Syu --noconfirm bash git curl make coreutils procps-ng util-linux
          bash --version | head -1

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install BATS from source
        run: |
          git clone --depth 1 --branch "v1.11.1" \
            https://github.com/bats-core/bats-core.git /tmp/bats-core
          cd /tmp/bats-core
          ./install.sh /usr/local
          bats --version

      - name: Prepare test stubs
        run: chmod +x tests/stubs/*

      - name: Run unit tests
        run: |
          mkdir -p test-results
          bats tests/unit/ --tap > test-results/unit.tap 2>&1 || {
            echo "Unit tests failed:"
            cat test-results/unit.tap
            exit 1
          }
          cat test-results/unit.tap

      - name: Run integration tests
        run: |
          mkdir -p test-results
          bats tests/integration/ --tap > test-results/integration.tap 2>&1 || {
            echo "Integration tests failed:"
            cat test-results/integration.tap
            exit 1
          }
          cat test-results/integration.tap

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.distro_label }}
          path: test-results/
          retention-days: 14

      - name: Test summary
        if: always()
        run: |
          echo "=== Test Matrix Entry ==="
          echo "  Distro: ${{ matrix.distro_label }}"
          echo "  Bash:   $(bash --version | head -1)"
          echo "  BATS:   $(bats --version)"
